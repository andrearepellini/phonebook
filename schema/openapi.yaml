openapi: 3.1.0
info:
  title: Phonebook API
  description: Backend API for managing phonebook contacts
  version: 1.0.0
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Contacts
  description: Contact management APIs
- name: Hello world
  description: Hello world test API
paths:
  /api/contacts:
    get:
      tags:
      - Contacts
      summary: Get all contacts
      description: Retrieve a paginated list of contacts with optional filtering
      operationId: getAllContacts
      parameters:
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: deleted
        in: query
        required: false
        schema:
          type: boolean
      - name: page
        in: query
        description: Zero-based page index (0..N)
        required: false
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: size
        in: query
        description: The size of the page to be returned
        required: false
        schema:
          type: integer
          default: 20
          minimum: 1
      - name: sort
        in: query
        description: "Sorting criteria in the format: property,(asc|desc). Default\
          \ sort order is ascending. Multiple sort criteria are supported."
        required: false
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedModelContactDTO"
    post:
      tags:
      - Contacts
      summary: Create a new contact
      description: Create a new contact with the provided details
      operationId: createContact
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
        required: true
      responses:
        "201":
          description: Contact created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
  /api/contacts/{id}:
    get:
      tags:
      - Contacts
      summary: Get contact by ID
      description: Retrieve a single contact by its ID
      operationId: getContactById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Contact found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
    patch:
      tags:
      - Contacts
      summary: Update a contact
      description: Update an existing contact's details
      operationId: patchContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchContactRequest"
        required: true
      responses:
        "200":
          description: Contact updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
  /api/helloworld:
    get:
      tags:
      - Hello world
      operationId: helloWorld
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
components:
  schemas:
    CreateContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        age:
          type: integer
          format: int32
    ContactDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        age:
          type: integer
          format: int32
        deleted:
          type: boolean
    PatchContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        age:
          type: integer
          format: int32
        deleted:
          type: boolean
    PageMetadata:
      type: object
      properties:
        size:
          type: integer
          format: int64
        number:
          type: integer
          format: int64
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int64
    PagedModelContactDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContactDTO"
        page:
          $ref: "#/components/schemas/PageMetadata"
