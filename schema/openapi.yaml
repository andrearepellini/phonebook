openapi: 3.1.0
info:
  title: Phonebook API
  description: Backend API for managing phonebook contacts
  version: 1.0.0
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Contacts
  description: Contact management APIs
- name: Hello world
  description: Hello world test API
paths:
  /api/contacts:
    get:
      tags:
      - Contacts
      summary: Get all contacts
      description: Retrieve a paginated list of contacts with optional filtering
      operationId: getAllContacts
      parameters:
      - name: filter
        in: query
        required: false
        schema:
          type: string
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageContactDTO"
    post:
      tags:
      - Contacts
      summary: Create a new contact
      description: Create a new contact with the provided details
      operationId: createContact
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
        required: true
      responses:
        "201":
          description: Contact created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
  /api/contacts/{id}:
    get:
      tags:
      - Contacts
      summary: Get contact by ID
      description: Retrieve a single contact by its ID
      operationId: getContactById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Contact found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
    patch:
      tags:
      - Contacts
      summary: Update a contact
      description: Update an existing contact's details
      operationId: patchContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchContactRequest"
        required: true
      responses:
        "200":
          description: Contact updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactDTO"
  /api/helloworld:
    get:
      tags:
      - Hello world
      operationId: helloWorld
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
components:
  schemas:
    CreateContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        age:
          type: integer
          format: int32
    ContactDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        age:
          type: integer
          format: int32
        deleted:
          type: boolean
    PatchContactRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        phoneNumber:
          type: string
        age:
          type: integer
          format: int32
        deleted:
          type: boolean
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageContactDTO:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContactDTO"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        sorted:
          type: boolean
        empty:
          type: boolean
        unsorted:
          type: boolean
