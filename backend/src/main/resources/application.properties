spring.application.name=phonebook-backend

# Local configuration
spring.datasource.url=jdbc:mysql://localhost:3306/phonebook?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.platform=mysql
server.port=8080
spring.jpa.open-in-view=false

security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000
security.jwt.cookie.name=${JWT_COOKIE_NAME:phonebook_auth}
security.jwt.cookie.path=${JWT_COOKIE_PATH:/}
security.jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Strict}
security.jwt.cookie.secure=${JWT_COOKIE_SECURE:true}

spring.config.import=optional:file:.env[.properties]
