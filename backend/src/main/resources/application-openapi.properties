# Profile for OpenAPI schema generation - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:openapi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
security.jwt.secret-key=openapi_dummy_jwt_secret_key_just_for_schema
security.jwt.expiration-time=3600000
spring.mail.username=openapi@example.com
spring.mail.password=dummy-password
