services:
  mysql:
    image: mysql:8.4
    container_name: phonebook-mysql
    restart: unless-stopped
    env_file:
      - docker.env
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: phonebook-backend
    ports:
      - "8080:8080"
    env_file:
      - docker.env
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: phonebook-frontend
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql_data:
  frontend_node_modules:
  pnpm_store:
